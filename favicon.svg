<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#150630"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="45%" stop-color="#FDB927"/>
      <stop offset="100%" stop-color="#9A6200"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A6200"/>
      <stop offset="50%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#9A6200"/>
    </linearGradient>
    <linearGradient id="fig" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4922A"/>
      <stop offset="100%" stop-color="#7A4800"/>
    </linearGradient>
    <linearGradient id="banner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A1EA0"/>
      <stop offset="100%" stop-color="#250A50"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A1278"/>
      <stop offset="100%" stop-color="#1A0840"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#FDB927" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FDB927" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circ"><circle cx="256" cy="256" r="234"/></clipPath>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="254" fill="url(#gold)"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="234" fill="url(#bg)"/>

  <!-- Sunburst rays (clipped to circle) -->
  <g clip-path="url(#circ)" opacity="0.28">
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(0   256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(15  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(30  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(45  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(60  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(75  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(90  256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(105 256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(120 256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(135 256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(150 256 256)"/>
    <rect x="253" y="22"  width="6" height="234" fill="#FDB927" transform="rotate(165 256 256)"/>
  </g>

  <!-- Gold glow behind figure -->
  <ellipse cx="256" cy="215" rx="145" ry="130" fill="url(#sunGlow)"/>

  <!-- Inner ring lines -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="#FDB927" stroke-width="3.5" opacity="0.7"/>
  <circle cx="256" cy="256" r="224" fill="none" stroke="#FDB927" stroke-width="1.5" opacity="0.3"/>

  <!-- ── STARS (3) ── -->
  <!-- helper: star at cx,cy outer=R inner=r -->
  <!-- center star -->
  <polygon filter="url(#gf)" fill="url(#gold)"
    points="256,72 262.2,90.2 281.6,90.2 266.7,101.4 272.9,119.6 256,108.4 239.1,119.6 245.3,101.4 230.4,90.2 249.8,90.2"/>
  <!-- left star -->
  <polygon filter="url(#gf)" fill="url(#gold)"
    points="204,88 209,103 224,103 212,112 217,127 204,118 191,127 196,112 184,103 199,103"/>
  <!-- right star -->
  <polygon filter="url(#gf)" fill="url(#gold)"
    points="308,88 313,103 328,103 316,112 321,127 308,118 295,127 300,112 288,103 303,103"/>

  <!-- ── FIGURE SILHOUETTE ── -->
  <!-- Head -->
  <ellipse cx="256" cy="152" rx="26" ry="30" fill="url(#fig)"/>

  <!-- Dreadlocks -->
  <ellipse cx="244" cy="176" rx="9" ry="20" fill="#2A1408" transform="rotate(-12 244 162)"/>
  <ellipse cx="254" cy="180" rx="8" ry="18" fill="#2A1408"/>
  <ellipse cx="264" cy="177" rx="7" ry="16" fill="#2A1408" transform="rotate(10 264 166)"/>
  <ellipse cx="272" cy="171" rx="6" ry="13" fill="#2A1408" transform="rotate(18 272 163)"/>

  <!-- Neck -->
  <rect x="248" y="176" width="16" height="14" rx="4" fill="url(#fig)"/>

  <!-- Torso — wide trapezoid narrowing to waist -->
  <path d="M186,192 C196,182 218,185 256,183 C294,185 316,182 326,192
           L318,285 C300,300 278,306 256,306 C234,306 212,300 194,285 Z"
        fill="url(#fig)"/>

  <!-- Chest definition crease -->
  <path d="M218,218 Q256,230 294,218" fill="none" stroke="#5A3000" stroke-width="2.5" opacity="0.5"/>
  <!-- Abs -->
  <path d="M240,252 Q256,258 272,252 M240,272 Q256,278 272,272" fill="none" stroke="#5A3000" stroke-width="2" opacity="0.4"/>

  <!-- LEFT ARM -->
  <!-- Upper arm (shoulder to elbow, going up-left) -->
  <path d="M192,196 C178,198 162,196 148,182 C140,174 140,162 150,158
           C162,154 176,162 188,175 Z" fill="url(#fig)"/>
  <!-- Forearm (elbow to fist, going upward) -->
  <path d="M150,158 C143,142 144,122 150,108 C156,96 168,94 174,104
           C180,116 174,138 163,155 Z" fill="url(#fig)"/>
  <!-- Left fist -->
  <ellipse cx="156" cy="100" rx="18" ry="14" fill="url(#fig)"/>
  <!-- Bicep peak bump -->
  <ellipse cx="150" cy="148" rx="13" ry="8" fill="#C07820" transform="rotate(-60 150 148)"/>

  <!-- RIGHT ARM -->
  <!-- Upper arm -->
  <path d="M320,196 C334,198 350,196 364,182 C372,174 372,162 362,158
           C350,154 336,162 324,175 Z" fill="url(#fig)"/>
  <!-- Forearm -->
  <path d="M362,158 C369,142 368,122 362,108 C356,96 344,94 338,104
           C332,116 338,138 349,155 Z" fill="url(#fig)"/>
  <!-- Right fist -->
  <ellipse cx="356" cy="100" rx="18" ry="14" fill="url(#fig)"/>
  <!-- Bicep peak bump -->
  <ellipse cx="362" cy="148" rx="13" ry="8" fill="#C07820" transform="rotate(60 362 148)"/>

  <!-- ── BOTTOM BANNER ── -->
  <!-- Main "SOCIAL" banner — trapezoidal -->
  <path d="M68,292 Q68,280 80,278 L432,278 Q444,280 444,292 L444,352 Q444,364 432,366 L80,366 Q68,364 68,352 Z"
        fill="url(#banner)" stroke="url(#goldH)" stroke-width="5"/>
  <!-- Banner inner accent lines -->
  <line x1="72"  y1="300" x2="440" y2="300" stroke="#FDB927" stroke-width="1.5" opacity="0.35"/>
  <line x1="72"  y1="356" x2="440" y2="356" stroke="#FDB927" stroke-width="1.5" opacity="0.35"/>

  <!-- SOCIAL text -->
  <text x="256" y="350" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="72" font-weight="900" letter-spacing="3"
        fill="url(#gold)">SOCIAL</text>
  <!-- Text stroke for depth -->
  <text x="256" y="350" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="72" font-weight="900" letter-spacing="3"
        fill="none" stroke="#4A1A00" stroke-width="2" opacity="0.6">SOCIAL</text>

  <!-- "FIT CLUB" ribbon -->
  <path d="M96,366 L416,366 L406,414 Q396,426 256,426 Q116,426 106,414 Z"
        fill="url(#ribbon)" stroke="url(#goldH)" stroke-width="4"/>
  <!-- Ribbon inner line -->
  <line x1="100" y1="376" x2="412" y2="376" stroke="#FDB927" stroke-width="1.5" opacity="0.3"/>

  <!-- FIT CLUB text -->
  <text x="256" y="412" text-anchor="middle"
        font-family="'Arial Black','Impact',sans-serif"
        font-size="34" font-weight="900" letter-spacing="5"
        fill="#FDB927">· FIT CLUB ·</text>

  <!-- Second inner gold ring (decorative) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
</svg>
